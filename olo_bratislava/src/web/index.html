<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OLO Bratislava</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <p class="eyebrow">Home Assistant add-on</p>
          <h1>OLO Bratislava</h1>
          <p class="intro">
            Konfiguracia, diagnostika a preview pre najblizsi odvoz odpadu z OLO.
          </p>
        </div>
        <div class="status-card">
          <div class="status-pill" id="status-pill">Loading</div>
          <p id="status-text">Nacitavam aktualny stav...</p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Nastavenia</h2>
          <div class="actions">
            <button id="save-button" class="primary">Ulozit</button>
            <button id="refresh-button">Obnovit teraz</button>
          </div>
        </div>
        <form id="settings-form" class="settings-grid">
          <label>
            <span>Zdrojova URL</span>
            <input name="sourceUrl" type="url" required />
          </label>
          <label>
            <span>Evidencne cislo</span>
            <input name="registrationNumber" type="text" placeholder="napr. 1234567" />
          </label>
          <label>
            <span>Interval obnovy (h)</span>
            <input name="refreshIntervalHours" type="number" min="1" max="168" />
          </label>
          <label>
            <span>Cas notifikacie</span>
            <input name="notificationTime" type="time" />
          </label>

          <fieldset>
            <legend>Zobrazovane kategorie</legend>
            <label><input name="showMixed" type="checkbox" /> Zmesovy odpad</label>
            <label><input name="showKitchenBio" type="checkbox" /> Kuchynsky bioodpad</label>
            <label><input name="showGardenBio" type="checkbox" /> Zahradny bioodpad</label>
            <label><input name="showPlastic" type="checkbox" /> Plast</label>
            <label><input name="showPaper" type="checkbox" /> Papier</label>
            <label><input name="showGlass" type="checkbox" /> Sklo</label>
          </fieldset>

          <fieldset>
            <legend>Notifikacie</legend>
            <label><input name="notifyPersistent" type="checkbox" /> Persistent notification</label>
            <label><input name="notifyMobile" type="checkbox" /> Mobile push</label>
            <label>
              <span>Jazyk</span>
              <select name="locale">
                <option value="sk">sk</option>
                <option value="en">en</option>
              </select>
            </label>
          </fieldset>

          <label class="full-width">
            <span>Vybrane mobile notify sluzby</span>
            <select id="mobile-services" name="mobileNotifyServices" multiple size="6"></select>
          </label>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Preview najblizsieho odvozu</h2>
        </div>
        <div id="preview-root" class="preview-empty">Zatial nie su k dispozicii ziadne data.</div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Nasledujuce terminy</h2>
        </div>
        <div id="upcoming-list" class="upcoming-list"></div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
